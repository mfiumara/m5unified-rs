name: host-check

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"
      - "fix/**"
      - "ci/**"
      - "docs/**"

permissions:
  contents: read

jobs:
  rust:
    name: Rust host checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run host checks
        run: bash scripts/check-host.sh

  esp32s3-firmware:
    name: ESP32-S3 firmware build
    runs-on: ubuntu-latest
    env:
      CARGO_BUILD_JOBS: "4"
      CMAKE_BUILD_PARALLEL_LEVEL: "4"
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            cmake \
            git \
            libclang-dev \
            ninja-build \
            python3 \
            python3-pip

      - name: Install ESP32-S3 Rust toolchain
        uses: esp-rs/xtensa-toolchain@v1.7.0
        with:
          buildtargets: esp32s3
          ldproxy: true

      - name: Cache ESP-IDF firmware cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          cache-directories: .embuild
          cache-on-failure: true
          key: esp32s3-firmware

      - name: Build hello-display firmware
        run: |
          . ~/export-esp.sh
          bash scripts/check-esp32s3-firmware.sh

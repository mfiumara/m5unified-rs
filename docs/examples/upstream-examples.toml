# Mapping from upstream M5Unified examples to Rust example binaries.
# status values: not_started, skeleton, host_compiles, espidf_compiles, hardware_verified, blocked

[[example]]
upstream = "Advanced/Bluetooth_with_ESP32A2DP/Bluetooth_with_ESP32A2DP.ino"
rust_bin = "advanced_bluetooth_with_esp32a2dp"
status = "host_compiles"
category = "advanced"
requires = ["speaker", "buttons", "display", "bluetooth-a2dp"]
notes = "Bluetooth stack remains example-level/feature-gated; core crate provides speaker raw playback."

[[example]]
upstream = "Advanced/MP3_with_ESP8266Audio/MP3_with_ESP8266Audio.ino"
rust_bin = "advanced_mp3_with_esp8266audio"
status = "host_compiles"
category = "advanced"
requires = ["speaker", "display", "sd", "mp3-decoder"]
notes = "ESP8266Audio is not part of core binding; prefer Rust decoder or feature-gated adapter."

[[example]]
upstream = "Advanced/Mic_FFT/Mic_FFT.ino"
rust_bin = "advanced_mic_fft"
status = "host_compiles"
category = "advanced"
requires = ["microphone", "display", "fft"]
notes = "Rust FFT should live in example package, not m5unified core."

[[example]]
upstream = "Advanced/Speak_with_AquesTalk/Speak_with_AquesTalk.ino"
rust_bin = "advanced_speak_with_aquestalk"
status = "host_compiles"
category = "advanced"
requires = ["speaker", "display", "aquestalk"]
notes = "AquesTalk remains optional due licensing/binary availability."

[[example]]
upstream = "Advanced/Speaker_SD_wav_file/Speaker_SD_wav_file.ino"

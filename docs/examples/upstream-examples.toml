# Mapping from upstream M5Unified examples to Rust example binaries.
# status values: not_started, skeleton, host_compiles, espidf_compiles, hardware_verified, blocked

[[example]]
upstream = "Advanced/Bluetooth_with_ESP32A2DP/Bluetooth_with_ESP32A2DP.ino"
rust_bin = "advanced_bluetooth_with_esp32a2dp"
status = "blocked"
category = "advanced"
requires = ["speaker", "buttons", "display", "bluetooth-a2dp"]
notes = "Blocked on app-level Bluetooth A2DP stack selection; the example exposes a clear unavailable path and core crate provides speaker raw playback."

[[example]]
upstream = "Advanced/MP3_with_ESP8266Audio/MP3_with_ESP8266Audio.ino"
rust_bin = "advanced_mp3_with_esp8266audio"
status = "blocked"
category = "advanced"
requires = ["speaker", "display", "sd", "mp3-decoder"]
notes = "Blocked on app-level MP3 decoder choice; ESP8266Audio is not part of core binding."

[[example]]
upstream = "Advanced/Mic_FFT/Mic_FFT.ino"
rust_bin = "advanced_mic_fft"
status = "host_compiles"
category = "advanced"
requires = ["microphone", "display", "fft"]
notes = "Uses an in-example DFT-style spectrum calculation; DSP dependencies stay outside m5unified core."

[[example]]
upstream = "Advanced/Speak_with_AquesTalk/Speak_with_AquesTalk.ino"
rust_bin = "advanced_speak_with_aquestalk"
status = "blocked"
category = "advanced"
requires = ["speaker", "display", "aquestalk"]
notes = "Blocked on external AquesTalk licensing/binary support; the example exposes a clear unavailable path."

[[example]]
upstream = "Advanced/Speaker_SD_wav_file/Speaker_SD_wav_file.ino"
rust_bin = "advanced_speaker_sd_wav_file"
status = "host_compiles"
category = "advanced"
requires = ["speaker", "sd", "wav"]
notes = "SD mount uses the ESP-IDF SDSPI helper; example loads WAV bytes from the mounted VFS and passes them to Speaker::play_wav."

[[example]]
upstream = "Advanced/WebRadio_with_ESP8266Audio/WebRadio_with_ESP8266Audio.ino"
